name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:all

      - name: Build
        run: |
          if [ -n "$VITE_API_BASE_URL" ]; then
            echo "Building GitHub Pages in backend API mode."
            export VITE_API_MODE=backend
          else
            echo "Building GitHub Pages in mock mode. Set the SYMPHONY_API_BASE_URL repository secret to enable backend mode."
            export VITE_API_MODE=mock
          fi
          npm run build
        env:
          # This is the public backend base URL, not the DeepSeek API key.
          # Example: https://your-backend.example.com/api/v1
          VITE_API_BASE_URL: ${{ secrets.SYMPHONY_API_BASE_URL }}

      - name: Publish dist to gh-pages
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          rm -rf /tmp/symphony-pages
          mkdir -p /tmp/symphony-pages
          cp -R dist/. /tmp/symphony-pages/
          cd /tmp/symphony-pages
          git init -b gh-pages
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add .
          git commit -m "Deploy ${GITHUB_SHA}"
          git push --force origin gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
